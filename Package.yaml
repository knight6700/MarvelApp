package:
  swift_version: "6.0"
  platforms:
    ios: "17"
    macos: "12"
dependencies:
  - name: ComposableArchitecture
    url: https://github.com/pointfreeco/swift-composable-architecture
    from: 1.17.1
    var_name: TCADependency
    package_name: swift-composable-architecture
  - name: SnapshotTesting
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: 1.16.0
    var_name: snapshotTesting
    package_name: swift-snapshot-testing
  - name: Kingfisher
    url: https://github.com/onevcat/Kingfisher
    from: 8.1.1
    var_name: kingFisher
    package_name: Kingfisher
  - name: HorizonKeys
    path: ArkanaKeys/HorizonKeys
    var_name: horizonKeys
    package_name: HorizonKeys

products:
  - name: Heroes
    targets: [Heroes]
  - name: HorizonComponent
    targets: [HorizonComponent]
    var_name: horizonComponent
  - name: HorizonNetwork
    targets: [HorizonNetwork]
    var_name: NETWORK

targets:
  - name: Heroes
    type: target
    dependencies:
      - ComposableArchitecture
      - HorizonComponent
      - HorizonNetwork

  - name: HorizonNetwork
    type: target
    dependencies:
      - HorizonKeys
      - ComposableArchitecture

  - name: HorizonComponent
    type: target
    dependencies:
      - Kingfisher
    resources:
      - Resources/Icons/Images.xcassets
      - Resources/Colors/Colors.xcassets

  - name: MarvelSnapshotTests
    type: testTarget
    dependencies:
      - Heroes
      - HorizonComponent
      - ComposableArchitecture
      - SnapshotTesting

  - name: MarvelCoreTests
    type: testTarget
    dependencies:
      - Heroes
      - ComposableArchitecture
      - HorizonNetwork
