# Paths to include during linting
included:
  - MarvelCore
  - WallaMarvel
  - WallaMarvelTests
  - WallaMarvelUITests
# Paths to exclude during linting
excluded:
  - Carthage
  - Pods
  - MarvelCore/.build
  - DerivedData
  - vendor
  - MarvelCore/Sources/Heroes/Mocks

# Basic rule configuration
disabled_rules:
  - trailing_whitespace
  - todo

# Line length
line_length:
  warning: 120
  error: 150

# Function body length
function_body_length:
  warning: 50
  error: 100

# Function parameter count
function_parameter_count:
  warning: 5
  error: 8

# Type body length
type_body_length:
  warning: 200
  error: 350

# File length
file_length:
  warning: 400
  error: 500

# Cyclomatic complexity
cyclomatic_complexity:
  warning: 10
  error: 20

# Nesting
nesting:
  type_level:
    warning: 2
  function_level:
    warning: 3

# Identifier name
identifier_name:
  min_length:
    warning: 2
  max_length:
    warning: 40
  excluded:
    - id
    - ok
    - x
    - y
    - z

# Type name
type_name:
  min_length:
    warning: 3
  max_length:
    warning: 40

# Large tuple
large_tuple:
  warning: 3
  error: 4

# Vertical whitespace
vertical_whitespace:
  max_empty_lines: 1

# Reporter
reporter: "xcode"
