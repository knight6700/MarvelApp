name: iOS CI + SonarCloud

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-analyze:
    name: Run Tests & SonarCloud
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Run Unit Tests with Coverage
        run: |
          xcodebuild test \
            -project WallaMarvel.xcodeproj \
            -scheme MarvelCoreTests \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.5' \
            -enableCodeCoverage YES

      - name: Install xcresultparser
        run: |
          brew tap super-olive/tap
          brew install xcresultparser

      - name: Convert xcresult to coverage.lcov
        run: |
          RESULT_BUNDLE=$(find ~/Library/Developer/Xcode/DerivedData -name "*.xcresult" | sort | tail -n 1)
          echo "Result bundle: $RESULT_BUNDLE"
          xcresultparser convert --input "$RESULT_BUNDLE" --output coverage.lcov

      - name: Show Code Coverage Percentage
        run: |
          if [ -f coverage.lcov ]; then
            lines=$(grep -c '^DA:' coverage.lcov)
            covered=$(grep '^DA:' coverage.lcov | grep -c ',1')
            if [ "$lines" -gt 0 ]; then
              coverage=$(echo "scale=2; ($covered / $lines) * 100" | bc)
              echo "🟢 Code Coverage: $coverage%"
            else
              echo "⚠️ No lines found in coverage.lcov"
            fi
          else
            echo "❌ coverage.lcov not found"
          fi

      - name: Run SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          projectBaseDir: .
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Upload coverage.lcov
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.lcov
