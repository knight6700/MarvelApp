name: iOS CI with Arkana and SonarCloud

env:
  MARVEL_PUBLIC_DEBUG: ${{ secrets.MARVEL_PUBLIC_DEBUG }}
  MARVEL_PRIVATE_DEBUG: ${{ secrets.MARVEL_PRIVATE_DEBUG }}
  MARVEL_PUBLIC_RELEASE: ${{ secrets.MARVEL_PUBLIC_RELEASE }}
  MARVEL_PRIVATE_RELEASE: ${{ secrets.MARVEL_PRIVATE_RELEASE }}

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Run SwiftLint
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint --config marvelCore/.swiftlint.yml

      - name: Set up Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Verify Swift version
        run: swift --version

  build:
    name: Build and Test App
    runs-on: self-hosted
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Shallow clones should be disabled for better SonarCloud analysis

      - name: Set up Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install dependencies
        run: |
          brew install arkana-cli || true
          gem install bundler
          gem install fastlane
          bundle install

      - name: Set Marvel API keys and run Arkana
        run: |
          echo "Setting Marvel API keys for Arkana..."
          export publicKeyDebug="${MARVEL_PUBLIC_DEBUG}"
          export privateKeyDebug="${MARVEL_PRIVATE_DEBUG}"
          export publicKeyRelease="${MARVEL_PUBLIC_RELEASE}"
          export privateKeyRelease="${MARVEL_PRIVATE_RELEASE}"

          echo "Keys loaded:"
          echo "- publicKeyDebug: ${publicKeyDebug:0:4}..."
          echo "- privateKeyDebug: ${privateKeyDebug:0:4}..."
          echo "- publicKeyRelease: ${publicKeyRelease:0:4}..."
          echo "- privateKeyRelease: ${privateKeyRelease:0:4}..."

          bundle exec arkana

      - name: Skip Xcode macro validations
        run: |
          defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES
          defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidation -bool YES

      - name: Clean Build Environment
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData
          rm -rf .build

      - name: Resolve SPM Dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project WallaMarvel.xcodeproj \
            -scheme WallaMarvel

      - name: Build the app
        run: |
          xcodebuild build \
            -project WallaMarvel.xcodeproj \
            -scheme WallaMarvel \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.5'

      - name: Generate Coverage Reports using Fastlane
        run: |
          # Use Fastlane to run tests and generate coverage reports
          bundle exec fastlane ios generate_coverage

      - name: Install SonarCloud Scanner
        run: |
          brew install sonar-scanner

      - name: Run SonarCloud Scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          sonar-scanner \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.sources=. \
            -Dsonar.exclusions=**/*.xcresult/**,**/DerivedData/**,**/.build/**,**/Pods/**,**/*.generated.swift \
            -Dsonar.swift.coverage.reportPaths=coverage_output/core_coverage.json,coverage_output/snapshot_coverage.json \
            -Dsonar.swift.swiftLint.reportPaths=swiftlint-report.xml

      - name: Upload Coverage Reports (Optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: coverage_output/
          retention-days: 7

      - name: Upload Snapshot Test Results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: MarvelSnapshotTests.xcresult
          path: ${{ runner.temp }}/MarvelSnapshotTests.xcresult
          retention-days: 1
