name: iOS CI with Arkana and SonarCloud

env:
  MARVEL_PUBLIC_DEBUG: ${{ secrets.MARVEL_PUBLIC_DEBUG }}
  MARVEL_PRIVATE_DEBUG: ${{ secrets.MARVEL_PRIVATE_DEBUG }}
  MARVEL_PUBLIC_RELEASE: ${{ secrets.MARVEL_PUBLIC_RELEASE }}
  MARVEL_PRIVATE_RELEASE: ${{ secrets.MARVEL_PRIVATE_RELEASE }}
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Run SwiftLint
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: |
          swiftlint --config marvelCore/.swiftlint.yml --reporter junit > swiftlint-report.xml
          swiftlint --config marvelCore/.swiftlint.yml

      - name: Set up Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Verify Swift version
        run: swift --version

      - name: Upload SwiftLint Report
        uses: actions/upload-artifact@v4
        with:
          name: swiftlint-report
          path: swiftlint-report.xml
          retention-days: 7

  build:
    name: Build and Test App
    runs-on: self-hosted
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install dependencies
        run: |
          brew install arkana-cli || true
          gem install bundler
          gem install fastlane
          bundle install

      - name: Set Marvel API keys and run Arkana
        run: |
          export publicKeyDebug="${MARVEL_PUBLIC_DEBUG}"
          export privateKeyDebug="${MARVEL_PRIVATE_DEBUG}"
          export publicKeyRelease="${MARVEL_PUBLIC_RELEASE}"
          export privateKeyRelease="${MARVEL_PRIVATE_RELEASE}"
          bundle exec arkana

      - name: Skip Xcode macro validations
        run: |
          defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES
          defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidation -bool YES

      - name: Clean Build Environment
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData
          rm -rf .build
      - name: Resolve SPM Dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project WallaMarvel.xcodeproj \
            -scheme WallaMarvel

      - name: Build the app
        run: |
          xcodebuild build \
            -project WallaMarvel.xcodeproj \
            -scheme WallaMarvel \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.5'

      - name: Run UnitTests
        run: |
          xcodebuild test \
            -project WallaMarvel.xcodeproj \
            -scheme MarvelCoreTests \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.5' \
            -enableCodeCoverage YES \

      - name: Run SnapshotTests
        run: |
          xcodebuild test \
            -project WallaMarvel.xcodeproj \
            -scheme MarvelSnapshotTests \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.5' \
            -enableCodeCoverage YES \

      - name: Convert Latest Xcresult to JSON
          run: |
            mkdir -p coverage_output
            LATEST_RESULT=$(find ~/Library/Developer/Xcode/DerivedData -type d -name "*.xcresult" | sort -r | head -n 1)
            echo "Using result bundle at: $LATEST_RESULT"
            xcrun xccov view --report --json "$LATEST_RESULT" > coverage_output/combined_coverage.json

      - name: Upload Coverage Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: coverage_output/
          retention-days: 7

      - name: Upload Snapshot Test Results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: MarvelSnapshotTests.xcresult
          path: ./TestResults/MarvelSnapshotTests.xcresult
          retention-days: 1

  sonarqube:
    name: SonarQube
    runs-on: self-hosted
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download SwiftLint Report
        uses: actions/download-artifact@v4
        with:
          name: swiftlint-report
          path: .

      - name: Download Coverage Reports
        uses: actions/download-artifact@v4
        with:
          name: coverage-reports
          path: coverage_output/

      - name: Install SonarQube Scanner
        run: |
          if ! command -v sonar-scanner &> /dev/null; then
            brew install sonar-scanner
          fi

      - name: Run SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          sonar-scanner \
            -Dsonar.projectKey=knight6700_MarvelApp \
            -Dsonar.organization=knight6700 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.sources=. \
            -Dsonar.exclusions=**/*.xcresult/**,**/DerivedData/**,**/.build/**,**/Pods/**,**/*.generated.swift \
            -Dsonar.swift.coverage.reportPaths=coverage_output/combined_coverage.json \
            -Dsonar.swift.swiftLint.reportPaths=swiftlint-report.xml

      - name: Cleanup Coverage, Test Results, and DerivedData logs
          if: always()
          run: |
             echo "🧹 Removing coverage_output/, TestResults/, and xcresult logs from DerivedData..."
             rm -rf coverage_output/ TestResults/
             find ~/Library/Developer/Xcode/DerivedData -type d -path "*/Logs/Test" -exec rm -rf {} \;
             echo "✅ Cleanup complete."
