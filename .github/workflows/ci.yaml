name: iOS CI with Arkana

env:
  MARVEL_PUBLIC_DEBUG: ${{ secrets.MARVEL_PUBLIC_DEBUG }}
  MARVEL_PRIVATE_DEBUG: ${{ secrets.MARVEL_PRIVATE_DEBUG }}
  MARVEL_PUBLIC_RELEASE: ${{ secrets.MARVEL_PUBLIC_RELEASE }}
  MARVEL_PRIVATE_RELEASE: ${{ secrets.MARVEL_PRIVATE_RELEASE }}

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  lint:
    name: Run SwiftLint
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint --config marvelCore/.swiftlint.yml

      - name: Set up Xcode 16.2
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Verify Swift version
        run: swift --version

  build:
    name: Build and Test App
    runs-on: macos-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Install dependencies
        run: |
          brew install arkana-cli || true
          gem install bundler
          bundle install

      - name: Set Marvel API keys and run Arkana
        run: |
          echo "Setting Marvel API keys for Arkana..."
          export publicKeyDebug="$MARVEL_PUBLIC_DEBUG"
          export privateKeyDebug="$MARVEL_PRIVATE_DEBUG"
          export publicKeyRelease="$MARVEL_PUBLIC_RELEASE"
          export privateKeyRelease="$MARVEL_PRIVATE_RELEASE"

          echo "Keys loaded:"
          echo "- publicKeyDebug: ${publicKeyDebug:0:4}..."
          echo "- privateKeyDebug: ${privateKeyDebug:0:4}..."
          echo "- publicKeyRelease: ${publicKeyRelease:0:4}..."
          echo "- privateKeyRelease: ${privateKeyRelease:0:4}..."

          bundle exec arkana

      - name: Skip Xcode macro validations
        run: |
          defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES
          defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidation -bool YES

      - name: Clean Build Environment
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData
          rm -rf .build

      - name: Resolve SPM Dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project WallaMarvel.xcodeproj \
            -scheme WallaMarvel

      - name: Build the app
        run: |
          xcodebuild build \
            -project WallaMarvel.xcodeproj \
            -scheme WallaMarvel \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.2'

      - name: Test the app
        run: |
          xcodebuild test \
            -project WallaMarvel.xcodeproj \
            -scheme MarvelCoreTests \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.2'

      - name: Running Snapshot testing
        env:
          LANG: en_US.UTF-8
          LC_ALL: en_US.UTF-8
          TZ: UTC
        run: |
          # Ensure simulator is ready and in consistent state
          xcrun simctl boot "iPhone 16" || echo "Simulator already booted"
          sleep 5  # Give simulator time to stabilize
          
          # Run snapshot tests with consistent environment
          xcodebuild test \
            -project WallaMarvel.xcodeproj \
            -scheme MarvelSnapshotTests \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.2' \
            -only-testing:MarvelSnapshotTests

      - name: Upload Test Results and Snapshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: MarvelSnapshotTests.xcresult
          path: ~/Library/Developer/Xcode/DerivedData/**/Logs/Test/*.xcresult
          retention-days: 1
