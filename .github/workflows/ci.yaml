name: iOS CI with Arkana and SonarCloud

env:
  MARVEL_PUBLIC_DEBUG: ${{ secrets.MARVEL_PUBLIC_DEBUG }}
  MARVEL_PRIVATE_DEBUG: ${{ secrets.MARVEL_PRIVATE_DEBUG }}
  MARVEL_PUBLIC_RELEASE: ${{ secrets.MARVEL_PUBLIC_RELEASE }}
  MARVEL_PRIVATE_RELEASE: ${{ secrets.MARVEL_PRIVATE_RELEASE }}
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Run SwiftLint
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: |
          swiftlint --config marvelCore/.swiftlint.yml --reporter junit > swiftlint-report.xml
          swiftlint --config marvelCore/.swiftlint.yml

      - name: Set up Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Verify Swift version
        run: swift --version

      - name: Upload SwiftLint Report
        uses: actions/upload-artifact@v4
        with:
          name: swiftlint-report
          path: swiftlint-report.xml
          retention-days: 7

  build:
    name: Build and Test App
    runs-on: self-hosted
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install dependencies
        run: |
          brew install arkana-cli || true
          gem install bundler
          gem install fastlane
          bundle install

      - name: Set Marvel API keys and run Arkana
        run: |
          export publicKeyDebug="${MARVEL_PUBLIC_DEBUG}"
          export privateKeyDebug="${MARVEL_PRIVATE_DEBUG}"
          export publicKeyRelease="${MARVEL_PUBLIC_RELEASE}"
          export privateKeyRelease="${MARVEL_PRIVATE_RELEASE}"
          bundle exec arkana

      - name: Skip Xcode macro validations
        run: |
          defaults write com.apple.dt.Xcode IDESkipMacroFingerprintValidation -bool YES
          defaults write com.apple.dt.Xcode IDESkipPackagePluginFingerprintValidation -bool YES

      - name: Clean Build Environment
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData
          rm -rf .build

      - name: Resolve SPM Dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project WallaMarvel.xcodeproj \
            -scheme WallaMarvel

      - name: Build the app
        run: |
          xcodebuild build \
            -project WallaMarvel.xcodeproj \
            -scheme WallaMarvel \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.5'

      - name: Run UnitTests
        run: |
          xcodebuild test \
            -project WallaMarvel.xcodeproj \
            -scheme MarvelCoreTests \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.5' \
            -enableCodeCoverage YES

      - name: Run SnapshotTests
        run: |
          xcodebuild test \
            -project WallaMarvel.xcodeproj \
            -scheme MarvelSnapshotTests \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=18.5' \
            -enableCodeCoverage YES

      - name: Convert XcResult to JSON
        run: |
          mkdir -p coverage_output
          echo "📦 Converting MarvelCoreTests..."
          xcrun xccov view --report --json ./TestResults/MarvelCoreTests.xcresult > coverage_output/core_coverage.json
          echo "📦 Converting MarvelSnapshotTests..."
          xcrun xccov view --report --json ./TestResults/MarvelSnapshotTests.xcresult > coverage_output/snapshot_coverage.json
          echo "✅ JSON coverage files saved to coverage_output/"
      - name: Upload Coverage Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: coverage_output/
          retention-days: 7

      - name: Upload Snapshot Test Results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: MarvelSnapshotTests.xcresult
          path: ~/Library/Developer/Xcode/DerivedData/**/Logs/Test/*.xcresult
          retention-days: 1

  sonarqube:
    name: SonarQube
    runs-on: self-hosted
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download SwiftLint Report
        uses: actions/download-artifact@v4
        with:
          name: swiftlint-report
          path: .

      - name: Download Coverage Reports
        uses: actions/download-artifact@v4
        with:
          name: coverage-reports
          path: coverage_output/

      - name: Install SonarQube Scanner
        run: |
          if ! command -v sonar-scanner &> /dev/null; then
            brew install sonar-scanner
          fi

      - name: Run SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          sonar-scanner \
            -Dsonar.projectKey=knight6700_MarvelApp \
            -Dsonar.organization=knight6700 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.sources=. \
            -Dsonar.exclusions=**/*.xcresult/**,**/DerivedData/**,**/.build/**,**/Pods/**,**/*.generated.swift \
            -Dsonar.swift.coverage.reportPaths=coverage_output/core_coverage.json,coverage_output/snapshot_coverage.json \
            -Dsonar.swift.swiftLint.reportPaths=swiftlint-report.xml

      - name: Cleanup Coverage, Test Results, and DerivedData logs
        if: always()
        run: |
          echo "🧹 Starting cleanup..."
          if [ -d "coverage_output/" ]; then
            echo "Removing coverage_output/ directory..."
            rm -rf coverage_output/
            echo "✅ coverage_output/ removed"
          else
            echo "ℹ️  coverage_output/ not found"
          fi
          if [ -d "TestResults/" ]; then
            echo "Removing TestResults/ directory..."
            rm -rf TestResults/
            echo "✅ TestResults/ removed"
          else
            echo "ℹ️  TestResults/ not found"
          fi
          echo "Searching for .xcresult files in DerivedData..."
          XCRESULT_FILES=$(find ~/Library/Developer/Xcode/DerivedData -name "*.xcresult" -type d 2>/dev/null || true)

          if [ -n "$XCRESULT_FILES" ]; then
            echo "Found .xcresult files to remove:"
            echo "$XCRESULT_FILES"
            find ~/Library/Developer/Xcode/DerivedData -name "*.xcresult" -type d -exec rm -rf {} + 2>/dev/null || true
            echo "✅ .xcresult files removed"
          else
            echo "ℹ️  No .xcresult files found in DerivedData"
          fi
          echo "Cleaning entire DerivedData..."
          rm -rf ~/Library/Developer/Xcode/DerivedData/* 2>/dev/null || true
          echo "✅ DerivedData cleaned"
          echo "🎉 Cleanup complete!"
